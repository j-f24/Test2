<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/globe.gl@2.45.0/dist/globe.gl.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #dff3ff; }
    #globe { width: 100vw; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="globe"></div>

  <script>
    const BG = '#dff3ff'; // pastel background
    const globeEl = document.getElementById('globe');

    const globe = Globe()(globeEl)
      // 👉 replace this with your own hosted cartoon texture for best results:
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .backgroundColor(BG)
      .atmosphereColor('#7fd6ff')
      .atmosphereAltitude(0.25)
      .onGlobeClick(({ lat, lng }) => {
        let continent = "Unknown";
        if (lat > 0 && lng < -30 && lng > -170) continent = "North America";
        else if (lat < 0 && lng < -30) continent = "South America";
        else if (lat > 35 && lng > -10 && lng < 60) continent = "Europe";
        else if (lat < 35 && lat > -35 && lng > 10 && lng < 50) continent = "Africa";
        else if (lat > 0 && lng > 60) continent = "Asia";
        else if (lat < -35 && lng > 110) continent = "Australia";

        if (window.AppInventor?.setWebViewString) {
          window.AppInventor.setWebViewString(continent);
        }
      });

    // Force background (helps WebView)
    globe.renderer().setClearColor(0x000000, 0);
    globe.renderer().domElement.style.background = BG;

    // Add a “toon outline” sphere behind the globe (requires THREE)
    if (window.THREE) {
      const outlineGeom = new THREE.SphereGeometry(100.7, 64, 64); // slightly larger than globe (globe radius ~100)
      const outlineMat = new THREE.MeshBasicMaterial({ color: 0x2b2b2b, side: THREE.BackSide });
      const outlineMesh = new THREE.Mesh(outlineGeom, outlineMat);
      globe.scene().add(outlineMesh);
    }
  </script>
</body>
</html>
